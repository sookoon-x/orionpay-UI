<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8CFF"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Orion constellation inspired logo -->
  <circle cx="15" cy="20" r="4" fill="url(#logoGradient)"/>
  <circle cx="25" cy="12" r="3" fill="url(#logoGradient)"/>
  <circle cx="35" cy="20" r="4" fill="url(#logoGradient)"/>
  <circle cx="30" cy="28" r="2.5" fill="url(#logoGradient)"/>
  <circle cx="42" cy="15" r="3" fill="url(#logoGradient)"/>
  <!-- Connecting lines -->
  <line x1="15" y1="20" x2="25" y2="12" stroke="url(#logoGradient)" stroke-width="1.5"/>
  <line x1="25" y1="12" x2="35" y2="20" stroke="url(#logoGradient)" stroke-width="1.5"/>
  <line x1="35" y1="20" x2="30" y2="28" stroke="url(#logoGradient)" stroke-width="1.5"/>
  <line x1="35" y1="20" x2="42" y2="15" stroke="url(#logoGradient)" stroke-width="1.5"/>
  <!-- Text -->
  <text x="55" y="25" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="white">Orionpay</text>
</svg>